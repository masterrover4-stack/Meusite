<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const matrix = letters.split("");

const fontSize = 16;
const columns = canvas.width/fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){
ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff9f";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){
const text = matrix[Math.floor(Math.random()*matrix.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;
}
}

setInterval(draw,35);
</script>
  <script>
const mensagens = [
"Conectando ao servidor...",
"Acessando banco de dados...",
"Quebrando senha...",
"ACESSO LIBERADO ✅"
];

let i = 0;
let terminal = document.getElementById("terminal");

function escrever(){
if(i < mensagens.length){
let linha = document.createElement("p");
linha.textContent = mensagens[i];
terminal.appendChild(linha);
i++;
setTimeout(escrever,1500);
}
}

escrever();
  </script>
  <script>
const mensagens = [
"Conectando ao servidor...",
"Acessando banco de dados...",
"Quebrando senha...",
"Acesso liberado."
];

let linha = 0;
let letra = 0;

function digitar() {

if(linha < mensagens.length){

let terminal = document.getElementById("terminal");

if(!terminal.children[linha]){
let p = document.createElement("p");
terminal.appendChild(p);
}

let texto = mensagens[linha];

terminal.children[linha].textContent += texto.charAt(letra);

letra++;

if(letra < texto.length){

setTimeout(digitar,50);

}else{

linha++;
letra = 0;

setTimeout(digitar,800);

}

}

}

digitar();
  </script>
  <script>

let progresso = 0;

function hackear(){

let barra = document.getElementById("progresso");
let status = document.getElementById("status");

if(progresso < 100){

progresso++;

barra.style.width = progresso + "%";
status.innerText = progresso + "%";

setTimeout(hackear,60);

}else{

status.innerText = "ACESSO TOTAL LIBERADO 💻";

}

}

hackear();

  </script>
