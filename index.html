<!DOCTYPE html>
<html>

<head>
<title>Claud Site</title>

<style>
  #terminal{
margin-top:40px;
font-size:18px;
color:#00ff9f;
font-family:Courier New, monospace;
  }
body{
  background:black;
  color:#00ff9f;
  font-family:Courier New, monospace;
  text-align:center;
  margin-top:100px;
}

h1{
  font-size:50px;
  text-shadow:0 0 10px #00ff9f, 0 0 20px #00ff9f;
}

p{
  font-size:20px;
}

button{
  margin-top:30px;
  padding:15px 30px;
  background:#00ff9f;
  border:none;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

  background:#00cc7a;
}

</head>

<body>
<div id="terminal"></div>
<h1>ACCESSO GARANTIDO 💻</h1>
<p>Bem-vindo e Faça o pix.</p>

<button onclick="alert('Sistema desbloqueado 😎')">
Não Click aqui
</button>
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const matrix = letters.split("");

const fontSize = 16;
const columns = canvas.width/fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){
ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff9f";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){
const text = matrix[Math.floor(Math.random()*matrix.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;
}
}

setInterval(draw,35);
</script>
  <script>
const mensagens = [
"Conectando ao servidor...",
"Acessando banco de dados...",
"Quebrando senha...",
"ACESSO LIBERADO ✅"
];

let i = 0;
let terminal = document.getElementById("terminal");

function escrever(){
if(i < mensagens.length){
let linha = document.createElement("p");
linha.textContent = mensagens[i];
terminal.appendChild(linha);
i++;
setTimeout(escrever,1500);
}
}

escrever();
  </script>
</body>
